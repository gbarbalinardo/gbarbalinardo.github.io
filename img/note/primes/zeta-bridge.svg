<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="Helvetica, Arial, sans-serif">
<rect width="900" height="470" fill="white"/>
<text x="450.0" y="34" font-size="18" fill="#3A3A3A" text-anchor="middle" font-weight="bold" >Add up every number, and you get the zeta function</text>
<text x="70" y="130" font-size="22" fill="#8C2B33" text-anchor="start" font-weight="bold" >ζ(s) =</text>
<line x1="112" y1="124" x2="148" y2="124" stroke="#3A3A3A" stroke-width="1.8"/>
<text x="130" y="118" font-size="16" fill="#3A3A3A" text-anchor="middle" font-weight="normal" >1</text>
<text x="130" y="146" font-size="16" fill="#3A3A3A" text-anchor="middle" font-weight="normal" >1</text>
<text x="142" y="140" font-size="11" fill="#3A3A3A" text-anchor="middle" font-weight="normal" >s</text>
<text x="183" y="130" font-size="20" fill="#9AA0A6" text-anchor="middle" font-weight="normal" >+</text>
<line x1="217" y1="124" x2="253" y2="124" stroke="#3A3A3A" stroke-width="1.8"/>
<text x="235" y="118" font-size="16" fill="#3A3A3A" text-anchor="middle" font-weight="normal" >1</text>
<text x="235" y="146" font-size="16" fill="#3A3A3A" text-anchor="middle" font-weight="normal" >2</text>
<text x="247" y="140" font-size="11" fill="#3A3A3A" text-anchor="middle" font-weight="normal" >s</text>
<text x="283" y="130" font-size="20" fill="#9AA0A6" text-anchor="middle" font-weight="normal" >+</text>
<line x1="317" y1="124" x2="353" y2="124" stroke="#3A3A3A" stroke-width="1.8"/>
<text x="335" y="118" font-size="16" fill="#3A3A3A" text-anchor="middle" font-weight="normal" >1</text>
<text x="335" y="146" font-size="16" fill="#3A3A3A" text-anchor="middle" font-weight="normal" >3</text>
<text x="347" y="140" font-size="11" fill="#3A3A3A" text-anchor="middle" font-weight="normal" >s</text>
<text x="383" y="130" font-size="20" fill="#9AA0A6" text-anchor="middle" font-weight="normal" >+</text>
<line x1="417" y1="124" x2="453" y2="124" stroke="#3A3A3A" stroke-width="1.8"/>
<text x="435" y="118" font-size="16" fill="#3A3A3A" text-anchor="middle" font-weight="normal" >1</text>
<text x="435" y="146" font-size="16" fill="#3A3A3A" text-anchor="middle" font-weight="normal" >4</text>
<text x="447" y="140" font-size="11" fill="#3A3A3A" text-anchor="middle" font-weight="normal" >s</text>
<text x="520" y="130" font-size="20" fill="#9AA0A6" text-anchor="middle" font-weight="normal" >+  ⋯</text>
<line x1="602" y1="124" x2="638" y2="124" stroke="#8C2B33" stroke-width="1.8"/>
<text x="620" y="118" font-size="16" fill="#8C2B33" text-anchor="middle" font-weight="normal" >1</text>
<text x="620" y="146" font-size="16" fill="#8C2B33" text-anchor="middle" font-weight="bold" >12</text>
<text x="632" y="140" font-size="11" fill="#8C2B33" text-anchor="middle" font-weight="normal" >s</text>
<rect x="590" y="100" width="60" height="58" rx="6" fill="none" stroke="#8C2B33" stroke-width="1.6" stroke-dasharray="5 3"/>
<text x="745" y="130" font-size="20" fill="#9AA0A6" text-anchor="middle" font-weight="normal" >+  ⋯</text>
<path d="M 620 168 C 600 192 560 196 500 210" fill="none" stroke="#8C2B33" stroke-width="1.6"/>
<text x="450.0" y="232" font-size="14" fill="#8C2B33" text-anchor="middle" font-weight="normal" >12's term is one drop in the sum: the "forget everything" corner of its square.</text>
<text x="450.0" y="252" font-size="14" fill="#3A3A3A" text-anchor="middle" font-weight="normal" >Keep the history instead and 12 pours in six times as much: a richer partition function.</text>
<line x1="90" y1="280" x2="810" y2="280" stroke="#9AA0A6" stroke-width="1" opacity="0.5"/>
<text x="450.0" y="306" font-size="14.5" fill="#9AA0A6" text-anchor="middle" font-weight="normal" >The same sum, factored over the primes (this is the AND hiding inside):</text>
<text x="450.0" y="344" font-size="19" fill="#3A3A3A" text-anchor="middle" font-weight="bold" >ζ(s)  =  1 / (1 − 2⁻ˢ)  ×  1 / (1 − 3⁻ˢ)  ×  1 / (1 − 5⁻ˢ)  ×  ⋯</text>
<text x="450.0" y="372" font-size="13.5" fill="#9AA0A6" text-anchor="middle" font-weight="normal" >one factor per prime, forever</text>
<text x="450.0" y="420" font-size="15.5" fill="#3A3A3A" text-anchor="middle" font-weight="normal" >Every integer contributes; the primes are the factors.</text>
<text x="450.0" y="445" font-size="15.5" fill="#8C2B33" text-anchor="middle" font-weight="bold" >Riemann's zeta function is the partition function of the gas of numbers.</text>
</svg>

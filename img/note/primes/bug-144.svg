<circle cx="140" cy="106" r="4.5" fill="#1A1A1A"/>
<circle cx="112" cy="140" r="4.5" fill="#1A1A1A"/>
<text x="90" y="193" font-size="15" fill="#9E2B25" text-anchor="middle" font-weight="bold" style="font-variant-numeric:tabular-nums" >2</text>
<text x="134" y="193" font-size="15" fill="#9E2B25" text-anchor="middle" font-weight="bold" style="font-variant-numeric:tabular-nums" >2</text>
<text x="170" y="193" font-size="15" fill="#9E2B25" text-anchor="middle" font-weight="bold" style="font-variant-numeric:tabular-nums" >3</text>
<text x="140" y="218" font-size="15" fill="#2E5E8C" text-anchor="middle" font-weight="bold" font-family="'Helvetica Neue Condensed', 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif" style="font-variant-numeric:tabular-nums" >A</text>
<line x1="310" y1="106" x2="282" y2="140" stroke="#1A1A1A" stroke-width="2"/>
<line x1="310" y1="106" x2="340" y2="172" stroke="#1A1A1A" stroke-width="2"/>
<line x1="282" y1="140" x2="260" y2="172" stroke="#1A1A1A" stroke-width="2"/>
<line x1="282" y1="140" x2="304" y2="172" stroke="#1A1A1A" stroke-width="2"/>
<circle cx="310" cy="106" r="4.5" fill="#1A1A1A"/>
<circle cx="282" cy="140" r="4.5" fill="#1A1A1A"/>
<text x="260" y="193" font-size="15" fill="#9E2B25" text-anchor="middle" font-weight="bold" style="font-variant-numeric:tabular-nums" >2</text>
<text x="304" y="193" font-size="15" fill="#9E2B25" text-anchor="middle" font-weight="bold" style="font-variant-numeric:tabular-nums" >3</text>
<text x="340" y="193" font-size="15" fill="#9E2B25" text-anchor="middle" font-weight="bold" style="font-variant-numeric:tabular-nums" >2</text>
<text x="310" y="218" font-size="15" fill="#2E5E8C" text-anchor="middle" font-weight="bold" font-family="'Helvetica Neue Condensed', 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif" style="font-variant-numeric:tabular-nums" >B</text>
<rect x="470" y="96" width="100" height="42" rx="6" fill="#FBFAF7" stroke="#1A1A1A" stroke-width="1.4" />
<text x="520" y="123" font-size="15" fill="#1A1A1A" text-anchor="middle" font-weight="bold" font-family="'Helvetica Neue Condensed', 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif" style="font-variant-numeric:tabular-nums" >A · A</text>
<rect x="630" y="96" width="100" height="42" rx="6" fill="#FBFAF7" stroke="#9E2B25" stroke-width="1.6" stroke-dasharray='5 4'/>
<text x="680" y="123" font-size="15" fill="#9E2B25" text-anchor="middle" font-weight="bold" font-family="'Helvetica Neue Condensed', 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif" style="font-variant-numeric:tabular-nums" >A · B</text>

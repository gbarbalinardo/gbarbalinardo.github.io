<text x="520" y="191" font-size="15" fill="#9E2B25" text-anchor="middle" font-weight="bold" font-family="'Helvetica Neue Condensed', 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif" style="font-variant-numeric:tabular-nums" >B · A</text>
<rect x="630" y="164" width="100" height="42" rx="6" fill="#FBFAF7" stroke="#1A1A1A" stroke-width="1.4" />

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 344" font-family="'Helvetica Neue', 'Arial Narrow', Helvetica, Arial, sans-serif">
<rect width="860" height="344" fill="#FBFAF7"/>
<text x="40" y="30" font-size="11.5" fill="#6B6B6B" text-anchor="start" font-weight="bold" font-family="'Helvetica Neue Condensed', 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif" letter-spacing="1.6" style="font-variant-numeric:tabular-nums" >A ONE-UNIT CORRECTION</text>
<text x="40" y="52" font-size="19" fill="#1A1A1A" text-anchor="start" font-weight="bold" font-family="'Helvetica Neue Condensed', 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif" style="font-variant-numeric:tabular-nums" >Where the encyclopedia was wrong: n = 144</text>
<text x="40" y="76" font-size="13.5" fill="#6B6B6B" text-anchor="start" font-weight="normal" style="font-variant-numeric:tabular-nums" >144 = 12 × 12, and each 12 packs two ways, A and B:</text>
<line x1="140" y1="106" x2="112" y2="140" stroke="#1A1A1A" stroke-width="2"/>
<line x1="140" y1="106" x2="170" y2="172" stroke="#1A1A1A" stroke-width="2"/>

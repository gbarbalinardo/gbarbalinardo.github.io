<text x="580" y="214" font-size="16" fill="#3A3A3A" text-anchor="middle" font-weight="normal" >ordered: 4        unordered: 3</text>
<text x="430" y="280" font-size="15.5" fill="#3A3A3A" text-anchor="middle" font-weight="normal" >The encyclopedia's formula chose 4. The right answer is 3.</text>
<text x="430" y="306" font-size="16.5" fill="#8C2B33" text-anchor="middle" font-weight="bold" >Total at n = 144: it said 42; the truth is 41.</text>

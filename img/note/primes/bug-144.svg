<path d="M 680 142 C 650 160 550 144 520 162" fill="none" stroke="#9E2B25" stroke-width="1.6" stroke-dasharray="5 4"/>
<text x="720" y="158" font-size="12" fill="#9E2B25" text-anchor="start" font-weight="normal" font-family="'Helvetica Neue Condensed', 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif" style="font-variant-numeric:tabular-nums" >same object,</text>
<text x="720" y="174" font-size="12" fill="#9E2B25" text-anchor="start" font-weight="normal" font-family="'Helvetica Neue Condensed', 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif" style="font-variant-numeric:tabular-nums" >counted once</text>
<text x="600" y="246" font-size="15" fill="#1A1A1A" text-anchor="middle" font-weight="normal" font-family="'Helvetica Neue Condensed', 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif" style="font-variant-numeric:tabular-nums" >ordered pairs: 4      unordered: 3</text>
<line x1="40" y1="296" x2="820" y2="296" stroke="#DAD6CC" stroke-width="1"/>
<text x="40" y="318" font-size="13" fill="#6B6B6B" text-anchor="start" font-weight="normal" style="font-variant-numeric:tabular-nums" >The formula chose 4. The right count is 3, so the total at 144 is 41, not the 42 the entry listed.</text>
<text x="820" y="318" font-size="11.5" fill="#9E2B25" text-anchor="end" font-weight="bold" font-family="'Helvetica Neue Condensed', 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif" style="font-variant-numeric:tabular-nums" >ℹ  log₂ 3 ≈ 1.6 bits, miscounted as log₂ 4 = 2</text>
</svg>

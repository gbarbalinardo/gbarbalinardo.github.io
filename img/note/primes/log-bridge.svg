<text x="420" y="182" font-size="15" fill="#9AA0A6" text-anchor="middle" font-weight="normal" >exp</text>
<text x="420" y="250" font-size="15" fill="#9AA0A6" text-anchor="middle" font-weight="normal" >One translator, everywhere: decibels, earthquake magnitudes, pH, entropy.</text>

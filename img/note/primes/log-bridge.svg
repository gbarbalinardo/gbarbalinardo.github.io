<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 275" font-family="Helvetica, Arial, sans-serif">
<rect width="840" height="275" fill="white"/>
<rect x="40" y="60" width="300" height="150" rx="10" fill="white" stroke="#2B4B8C" stroke-width="2.6"/>
<text x="190" y="92" font-size="15" fill="#2B4B8C" text-anchor="middle" font-weight="bold" >the world compounds</text>
<text x="190" y="138" font-size="22" fill="#3A3A3A" text-anchor="middle" font-weight="normal" >1/2 × 1/2 = 1/4</text>
<text x="190" y="180" font-size="14" fill="#9AA0A6" text-anchor="middle" font-weight="normal" >probabilities multiply</text>
<rect x="500" y="60" width="300" height="150" rx="10" fill="white" stroke="#8C2B33" stroke-width="2.6"/>
<text x="650" y="92" font-size="15" fill="#8C2B33" text-anchor="middle" font-weight="bold" >the ruler pours</text>
<text x="650" y="138" font-size="22" fill="#3A3A3A" text-anchor="middle" font-weight="normal" >1 bit + 1 bit = 2 bits</text>
<text x="650" y="180" font-size="14" fill="#9AA0A6" text-anchor="middle" font-weight="normal" >information adds</text>
